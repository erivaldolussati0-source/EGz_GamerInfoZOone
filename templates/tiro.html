<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ categoria }} - EGz GamerInfoZOone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Header com nome do canal e barra de pesquisa -->
    <header>
        <h1>EGz GamerInfoZOone</h1>
        <form method="get" action="{{ url_for('categoria_page', categoria=categoria.lower()) }}">
            <input type="text" name="q" placeholder="Pesquisar..." value="{{ pesquisa }}">
            <button type="submit">🔍</button>
        </form>
    </header>

    <!-- Menu de categorias -->
    <nav class="menu">
        <a href="{{ url_for('categoria_page', categoria='futebol') }}">Futebol</a>
        <a href="{{ url_for('categoria_page', categoria='aventura') }}">Aventura</a>
        <a href="{{ url_for('categoria_page', categoria='tiro') }}">Tiro</a>
        <a href="{{ url_for('index') }}">Todos</a>
    </nav>

    <!-- Container de jogos -->
    <div class="container">
        {% for jogo in jogos %}
        <div class="card">
            <h2>{{ jogo.titulo }}</h2>

            {% if jogo.imagem %}
            <img src="{{ url_for('static', filename='uploads/' + jogo.imagem.split('/')[-1]) }}" alt="{{ jogo.titulo }}" class="jogo">
            {% endif %}

            <p>Requisitos: {{ jogo.requisitos }}</p>

            {% if jogo.download %}
            <a href="{{ url_for('static', filename='uploads/' + jogo.download.split('/')[-1]) }}" class="button" download>Download</a>
            {% endif %}
        </div>
        {% endfor %}
    </div>

</body>
</html>
