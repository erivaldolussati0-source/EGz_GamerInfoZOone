<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGz GamerInfoZOone</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>EGz GamerInfoZOone</h1>
    <form method="get" action="{{ url_for('index') }}">
        <input type="text" name="q" value="{{ pesquisa }}" placeholder="Pesquisar jogo...">
        <button type="submit">🔍</button>
    </form>
</header>

<nav class="menu">
    <a href="{{ url_for('index') }}">Inicio</a>
    <a href="{{ url_for('categoria_page', categoria='futebol') }}">Futebol</a>
    <a href="{{ url_for('categoria_page', categoria='aventura') }}">Aventura</a>
    <a href="{{ url_for('categoria_page', categoria='tiro') }}">Tiro</a>
</nav>

<div class="container">
    {% for jogo in jogos %}
    <div class="card">
        <h2>{{ jogo.titulo }}</h2>

        {% if jogo.imagem %}
        <img src="{{ url_for('static', filename='uploads/' + jogo.imagem) }}" alt="{{ jogo.titulo }}">
        {% endif %}

        <p>{{ jogo.requisitos }}</p>

        <!-- BOTÃO DOWNLOAD -->
        {% if jogo.download %}
        <a href="{{ url_for('static', filename='uploads/' + jogo.download) }}" class="button" download>
            ⬇️ Download
        </a>

        {% elif jogo.link %}
        <a href="{{ jogo.link }}" class="button" target="_blank">
            🔗 Download
        </a>
        {% endif %}

    </div>
    {% endfor %}
</div>

<!-- 🔥 ANÚNCIO ADSTERRA (POPUNDER) -->
<script src="https://pl28973604.profitablecpmratenetwork.com/96/43/91/964391712b3addc82bb3c1fc41a74adb.js"></script>

</body>
</html>
